<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DanaKita</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-slate-50 min-h-screen">

  <!-- LOADER -->
  <div id="loader" class="fixed inset-0 bg-black/50 z-50 hidden flex items-center justify-center">
    <div class="bg-white p-6 rounded-xl"><div class="animate-spin h-10 w-10 border-4 border-blue-600 border-t-transparent rounded-full"></div></div>
  </div>

  <!-- LOGIN MODAL -->
  <div id="loginModal" class="fixed inset-0 bg-black/60 z-40 flex items-center justify-center p-4">
    <!-- Step 1: Kode -->
    <div id="stepKode" class="bg-white rounded-2xl p-6 w-full max-w-sm">
      <h2 class="text-xl font-bold mb-4">🔑 Kode Organisasi</h2>
      <input type="text" id="inputKode" placeholder="DKT-XXXXX" class="w-full p-3 border rounded-xl mb-4 uppercase text-center font-mono">
      <button onclick="fnValidateKode()" class="w-full bg-blue-600 text-white py-3 rounded-xl font-bold">Lanjutkan</button>
      <a href="/super-admin.html" class="block text-center text-xs text-blue-600 mt-4">Super Admin</a>
    </div>

    <!-- Step 2: Login -->
    <div id="stepLogin" class="bg-white rounded-2xl p-6 w-full max-w-sm hidden">
      <h2 class="text-xl font-bold mb-4" id="orgNameDisplay">Login</h2>
      
      <div class="flex gap-2 mb-4 bg-slate-100 p-1 rounded-xl">
        <button onclick="fnSwitchTab('admin')" id="tabAdmin" class="flex-1 py-2 rounded-lg text-sm font-bold bg-white shadow text-blue-600">Admin</button>
        <button onclick="fnSwitchTab('warga')" id="tabWarga" class="flex-1 py-2 rounded-lg text-sm font-bold text-slate-500">Warga</button>
      </div>

      <div id="formAdmin">
        <input type="text" id="inpUser" placeholder="Username" class="w-full p-3 border rounded-xl mb-3">
        <input type="password" id="inpPass" placeholder="Password" class="w-full p-3 border rounded-xl mb-4">
        <button onclick="fnLoginAdmin()" class="w-full bg-blue-600 text-white py-3 rounded-xl font-bold">Masuk</button>
      </div>

      <div id="formWarga" class="hidden">
        <input type="text" id="inpRumah" placeholder="No. Rumah" class="w-full p-3 border rounded-xl mb-3">
        <input type="password" id="inpPin" placeholder="PIN" maxlength="6" class="w-full p-3 border rounded-xl mb-4">
        <button onclick="fnLoginWarga()" class="w-full bg-green-600 text-white py-3 rounded-xl font-bold">Masuk</button>
      </div>

      <button onclick="fnBackToKode()" class="w-full mt-4 text-sm text-slate-500">← Ganti Kode</button>
    </div>
  </div>

  <!-- MAIN APP -->
  <div id="mainApp" class="hidden">
    <header class="bg-white border-b p-4 sticky top-0 z-30">
      <div class="max-w-2xl mx-auto flex justify-between items-center">
        <h1 class="text-xl font-black text-blue-600">DANAKITA</h1>
        <button onclick="fnLogout()" class="bg-red-50 text-red-600 px-4 py-2 rounded-lg text-sm font-bold">Keluar</button>
      </div>
    </header>

    <main class="max-w-2xl mx-auto p-4">
      <!-- Admin Dashboard -->
      <div id="adminView" class="hidden space-y-4">
        <div class="bg-white p-6 rounded-xl shadow-sm border">
          <h3 class="font-bold mb-4">👥 Tambah Warga</h3>
          <input type="text" id="admNama" placeholder="Nama" class="w-full p-3 border rounded-xl mb-3">
          <input type="text" id="admRumah" placeholder="No. Rumah" class="w-full p-3 border rounded-xl mb-4">
          <button onclick="fnTambahWarga()" class="w-full bg-blue-600 text-white py-3 rounded-xl font-bold">Simpan</button>
          <div id="listWarga" class="mt-6 space-y-2"></div>
        </div>

        <div class="bg-white p-6 rounded-xl shadow-sm border">
          <h3 class="font-bold mb-4">📁 Tambah Project</h3>
          <input type="text" id="admProj" placeholder="Nama Project" class="w-full p-3 border rounded-xl mb-3">
          <input type="number" id="admNom" placeholder="Nominal" class="w-full p-3 border rounded-xl mb-4">
          <button onclick="fnTambahProject()" class="w-full bg-blue-600 text-white py-3 rounded-xl font-bold">Simpan</button>
          <div id="listProj" class="mt-6 space-y-2"></div>
        </div>
      </div>

      <!-- Warga Dashboard -->
      <div id="wargaView" class="hidden">
        <div class="bg-gradient-to-br from-blue-600 to-indigo-700 p-6 rounded-2xl text-white text-center">
          <p class="text-blue-200 text-sm">Saldo Kas</p>
          <h2 class="text-4xl font-black mt-2" id="saldoDisplay">Rp 0</h2>
        </div>
      </div>
    </main>

    <!-- Navigation -->
    <nav id="navAdmin" class="fixed bottom-0 left-0 right-0 bg-slate-900 text-white p-4 hidden">
      <div class="max-w-2xl mx-auto text-center text-sm">Panel Pengurus</div>
    </nav>
  </div>

  <script>
    // ==========================================
    // INIT SUPABASE (Global, sekali saja)
    // ==========================================
    window.dk = window.dk || {};
    if (!window.dk.supabase) {
      window.dk.supabase = window.supabase.createClient(
        'https://tgcpyatrllswhlysqfer.supabase.co',
        'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRnY3B5YXRybGxzd2hseXNxZmVyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU4MjI2ODMsImV4cCI6MjA5MTM5ODY4M30.BHY6R2e62YvXz-N_2n_qHossbKxPZxUX0y1lrNKketg'
      );
    }
    const db = window.dk.supabase;

    // State Global
    window.dk.state = {
      orgId: null,
      user: null
    };

    // ==========================================
    // FUNGSI-FUNGSI GLOBAL (Expose ke window)
    // ==========================================

    // 1. Validasi Kode Organisasi
    window.fnValidateKode = async function() {
      const kode = document.getElementById('inputKode').value.trim().toUpperCase();
      if (!kode) return alert('Masukkan kode!');

      document.getElementById('loader').classList.remove('hidden');
      const { data, error } = await db.from('organizations').select('id, nama').eq('client_code', kode).single();
      document.getElementById('loader').classList.add('hidden');

      if (data && !error) {
        window.dk.state.orgId = data.id;
        document.getElementById('orgNameDisplay').innerText = data.nama;
        document.getElementById('stepKode').classList.add('hidden');
        document.getElementById('stepLogin').classList.remove('hidden');
      } else {
        alert('Kode tidak valid!');
      }
    };

    // 2. Kembali ke input kode
    window.fnBackToKode = function() {
      document.getElementById('stepLogin').classList.add('hidden');
      document.getElementById('stepKode').classList.remove('hidden');
    };

    // 3. Switch Tab Admin/Warga
    window.fnSwitchTab = function(type) {
      const formAdmin = document.getElementById('formAdmin');
      const formWarga = document.getElementById('formWarga');
      const tabAdmin = document.getElementById('tabAdmin');
      const tabWarga = document.getElementById('tabWarga');

      if (type === 'admin') {
        formAdmin.classList.remove('hidden');
        formWarga.classList.add('hidden');
        tabAdmin.className = 'flex-1 py-2 rounded-lg text-sm font-bold bg-white shadow text-blue-600';
        tabWarga.className = 'flex-1 py-2 rounded-lg text-sm font-bold text-slate-500';
      } else {
        formWarga.classList.remove('hidden');
        formAdmin.classList.add('hidden');
        tabWarga.className = 'flex-1 py-2 rounded-lg text-sm font-bold bg-white shadow text-green-600';
        tabAdmin.className = 'flex-1 py-2 rounded-lg text-sm font-bold text-slate-500';
      }
    };

    // 4. Login Admin
    window.fnLoginAdmin = async function() {
      const user = document.getElementById('inpUser').value.trim();
      const pass = document.getElementById('inpPass').value;

      if (!user || !pass) return alert('Isi username & password!');

      document.getElementById('loader').classList.remove('hidden');
      const { data, error } = await db.rpc('rpc_login_admin', {
        p_username: user,
        p_password: pass,
        p_org_id: window.dk.state.orgId
      });
      document.getElementById('loader').classList.add('hidden');

      if (data && data.success) {
        window.dk.state.user = { type: 'admin', id: data.data.id, name: data.data.nama_admin };
        fnShowApp();
      } else {
        alert('Login gagal: ' + (data?.msg || 'Credential salah'));
      }
    };

    // 5. Login Warga
    window.fnLoginWarga = async function() {
      const rumah = document.getElementById('inpRumah').value.trim();
      const pin = document.getElementById('inpPin').value;

      if (!rumah || !pin) return alert('Isi No. Rumah & PIN!');

      document.getElementById('loader').classList.remove('hidden');
      const { data, error } = await db.rpc('rpc_login_warga', {
        p_no_rumah: rumah,
        p_pin: pin,
        p_org_id: window.dk.state.orgId
      });
      document.getElementById('loader').classList.add('hidden');

      if (data && data.success) {
        window.dk.state.user = { type: 'warga', id: data.data.id, name: data.data.nama };
        fnShowApp();
      } else {
        alert('Login gagal: ' + (data?.msg || 'Credential salah'));
      }
    };

    // 6. Tampilkan Aplikasi
    window.fnShowApp = function() {
      // Simpan session
      localStorage.setItem('dk_session', JSON.stringify({
        orgId: window.dk.state.orgId,
        user: window.dk.state.user,
        exp: Date.now() + 86400000
      }));

      // Hide modal, show app
      document.getElementById('loginModal').classList.add('hidden');
      document.getElementById('mainApp').classList.remove('hidden');

      if (window.dk.state.user.type === 'admin') {
        document.getElementById('adminView').classList.remove('hidden');
        document.getElementById('wargaView').classList.add('hidden');
        document.getElementById('navAdmin').classList.remove('hidden');
        fnLoadAdminData();
      } else {
        document.getElementById('wargaView').classList.remove('hidden');
        document.getElementById('adminView').classList.add('hidden');
        fnLoadWargaData();
      }
    };

    // 7. Logout
    window.fnLogout = function() {
      localStorage.removeItem('dk_session');
      window.dk.state = { orgId: null, user: null };
      location.reload();
    };

    // 8. Tambah Warga (Admin)
    window.fnTambahWarga = async function() {
      const nama = document.getElementById('admNama').value.trim();
      const rumah = document.getElementById('admRumah').value.trim();

      if (!nama) return alert('Isi nama!');

      document.getElementById('loader').classList.remove('hidden');
      
      // Hash PIN default (1234)
      const { data: hashData } = await db.rpc('hash_password', { raw_pass: '1234' });
      
      const { error } = await db.from('warga').insert([{
        id: 'WRG-' + Date.now(),
        organization_id: window.dk.state.orgId,
        nama: nama,
        no_rumah: rumah,
        pin_hash: hashData,
        status: 'ACTIVE'
      }]);

      document.getElementById('loader').classList.add('hidden');

      if (!error) {
        alert('Warga berhasil ditambah! PIN: 1234');
        document.getElementById('admNama').value = '';
        document.getElementById('admRumah').value = '';
        fnLoadAdminData();
      } else {
        alert('Error: ' + error.message);
      }
    };

    // 9. Tambah Project (Admin)
    window.fnTambahProject = async function() {
      const nama = document.getElementById('admProj').value.trim();
      const nom = document.getElementById('admNom').value;

      if (!nama) return alert('Isi nama project!');

      document.getElementById('loader').classList.remove('hidden');
      const { error } = await db.from('project').insert([{
        id: 'PRJ-' + Date.now(),
        organization_id: window.dk.state.orgId,
        nama_project: nama,
        nominal_default: nom || 0,
        tipe: 'bulanan',
        status: 'ACTIVE'
      }]);
      document.getElementById('loader').classList.add('hidden');

      if (!error) {
        alert('Project berhasil ditambah!');
        document.getElementById('admProj').value = '';
        document.getElementById('admNom').value = '';
        fnLoadAdminData();
      } else {
        alert('Error: ' + error.message);
      }
    };

    // 10. Load Data Admin
    window.fnLoadAdminData = async function() {
      document.getElementById('loader').classList.remove('hidden');
      
      const { data: warga } = await db.from('warga').select('*').eq('organization_id', window.dk.state.orgId);
      const { data: project } = await db.from('project').select('*').eq('organization_id', window.dk.state.orgId);

      document.getElementById('loader').classList.add('hidden');

      // Render Warga
      const listWarga = document.getElementById('listWarga');
      listWarga.innerHTML = '';
      if (warga && warga.length > 0) {
        warga.forEach(w => {
          listWarga.innerHTML += `<div class="bg-slate-50 p-3 rounded-lg text-sm"><b>${w.nama}</b> (${w.no_rumah}) - PIN: 1234</div>`;
        });
      } else {
        listWarga.innerHTML = '<p class="text-sm text-slate-400">Belum ada warga</p>';
      }

      // Render Project
      const listProj = document.getElementById('listProj');
      listProj.innerHTML = '';
      if (project && project.length > 0) {
        project.forEach(p => {
          listProj.innerHTML += `<div class="bg-blue-50 p-3 rounded-lg text-sm"><b>${p.nama_project}</b> - Rp ${Number(p.nominal_default).toLocaleString('id-ID')}</div>`;
        });
      } else {
        listProj.innerHTML = '<p class="text-sm text-slate-400">Belum ada project</p>';
      }
    };

    // 11. Load Data Warga
    window.fnLoadWargaData = async function() {
      document.getElementById('loader').classList.remove('hidden');
      const { data: pembayaran } = await db.from('pembayaran').select('*').eq('organization_id', window.dk.state.orgId).eq('status', 'DISETUJUI');
      document.getElementById('loader').classList.add('hidden');

      const total = pembayaran ? pembayaran.reduce((sum, p) => sum + Number(p.total_nominal), 0) : 0;
      document.getElementById('saldoDisplay').innerText = 'Rp ' + total.toLocaleString('id-ID');
    };

    // ==========================================
    // CHECK SESSION ON LOAD
    // ==========================================
    window.addEventListener('DOMContentLoaded', function() {
      const session = JSON.parse(localStorage.getItem('dk_session'));
      if (session && session.exp > Date.now()) {
        window.dk.state.orgId = session.orgId;
        window.dk.state.user = session.user;
        fnShowApp();
      }
    });
  </script>
</body>
</html>
