<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DanaKita - Portal Kas Komunitas</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  
  <style>
    body { background-color: #f8fafc; font-family: ui-sans-serif, system-ui, sans-serif; }
    .hidden { display: none !important; }
    .loader { border: 3px solid #f3f3f3; border-top: 3px solid #2563eb; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

  <!-- LOADING OVERLAY -->
  <div id="loader" class="fixed inset-0 bg-black/50 z-50 hidden flex items-center justify-center">
    <div class="loader"></div>
  </div>

  <!-- MAIN CONTAINER -->
  <div class="bg-white rounded-3xl shadow-2xl p-8 w-full max-w-md">
    
    <!-- HEADER -->
    <div class="text-center mb-8">
      <h1 class="text-3xl font-black text-blue-600 mb-2">DANAKITA</h1>
      <p class="text-slate-500 text-sm">Portal Kas Komunitas RT/RW</p>
    </div>

    <!-- SESSION INFO (Muncul jika sudah login) -->
    <div id="session-info" class="hidden mb-6 p-4 bg-green-50 border border-green-200 rounded-xl">
      <p class="text-sm text-green-800">
        ✅ Login sebagai: <strong id="session-name">-</strong><br>
        <span class="text-xs" id="session-role">-</span>
      </p>
      <button onclick="handleLogout()" class="mt-3 text-xs bg-red-500 text-white px-4 py-2 rounded-lg hover:bg-red-600">
        Keluar
      </button>
    </div>

    <!-- STEP 1: INPUT KODE ORGANISASI -->
    <div id="step-kode-org">
      <h2 class="text-lg font-bold text-slate-800 mb-4">🔑 Masukkan Kode Organisasi</h2>
      <input type="text" id="input-kode-org" 
        placeholder="Contoh: RT005-CIPETE-XYZ" 
        class="w-full p-4 border border-slate-300 rounded-xl mb-4 text-center font-mono text-lg uppercase tracking-wider"
        onkeypress="if(event.key==='Enter') handleValidateCode()">
      <button onclick="handleValidateCode()" 
        class="w-full bg-blue-600 text-white font-bold py-4 rounded-xl hover:bg-blue-700 transition">
        Lanjutkan
      </button>
      <p class="text-xs text-slate-400 mt-4 text-center">
        Belum punya kode? Hubungi Super Admin DanaKita
      </p>
    </div>

    <!-- STEP 2: LOGIN FORM (Muncul setelah kode valid) -->
    <div id="step-login" class="hidden">
      <div class="mb-6 p-3 bg-blue-50 border border-blue-200 rounded-lg">
        <p class="text-sm text-blue-800 font-bold" id="org-name-display">-</p>
        <p class="text-xs text-blue-600">Kode: <span id="org-code-display" class="font-mono">-</span></p>
      </div>

      <!-- Tab Login -->
      <div class="flex gap-2 mb-6">
        <button onclick="switchLoginTab('admin')" id="tab-admin" 
          class="flex-1 py-3 font-bold rounded-lg bg-blue-600 text-white transition">
          Pengurus
        </button>
        <button onclick="switchLoginTab('warga')" id="tab-warga" 
          class="flex-1 py-3 font-bold rounded-lg bg-slate-200 text-slate-600 transition">
          Warga
        </button>
      </div>

      <!-- Form Login Admin -->
      <div id="form-admin">
        <input type="text" id="admin-username" placeholder="Username" 
          class="w-full p-4 border border-slate-300 rounded-xl mb-4">
        <input type="password" id="admin-password" placeholder="Password" 
          class="w-full p-4 border border-slate-300 rounded-xl mb-4">
        <button onclick="handleAdminLogin()" 
          class="w-full bg-blue-600 text-white font-bold py-4 rounded-xl hover:bg-blue-700 transition">
          Masuk sebagai Pengurus
        </button>
      </div>

      <!-- Form Login Warga -->
      <div id="form-warga" class="hidden">
        <input type="text" id="warga-no-rumah" placeholder="No. Rumah (contoh: A-12)" 
          class="w-full p-4 border border-slate-300 rounded-xl mb-4 uppercase">
        <input type="password" id="warga-pin" placeholder="PIN (4-6 digit)" maxlength="6" 
          class="w-full p-4 border border-slate-300 rounded-xl mb-4">
        <button onclick="handleWargaLogin()" 
          class="w-full bg-green-600 text-white font-bold py-4 rounded-xl hover:bg-green-700 transition">
          Masuk sebagai Warga
        </button>
      </div>

      <button onclick="backToKode()" class="w-full mt-4 text-slate-500 text-sm py-2 hover:text-slate-700">
        ← Ganti Kode Organisasi
      </button>
    </div>

    <!-- DASHBOARD PLACEHOLDER (Akan diisi di Step 3) -->
    <div id="dashboard" class="hidden">
      <div class="text-center py-8">
        <div class="text-6xl mb-4">🏠</div>
        <h2 class="text-xl font-bold text-slate-800 mb-2">Selamat Datang!</h2>
        <p class="text-slate-500 text-sm mb-6">Dashboard akan ditampilkan di sini</p>
        <div class="p-4 bg-yellow-50 border border-yellow-200 rounded-lg text-sm text-yellow-800">
           Step 3: Super Admin Panel akan ditambahkan selanjutnya
        </div>
      </div>
    </div>

  </div>

  <!-- JAVASCRIPT -->
  <script>
    // =======================================================================
    // KONFIGURASI SUPABASE
    // =======================================================================
    const SUPABASE_URL = 'https://tgcpyatrllswhlysqfer.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRnY3B5YXRybGxzd2hseXNxZmVyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU4MjI2ODMsImV4cCI6MjA5MTM5ODY4M30.BHY6R2e62YvXz-N_2n_qHossbKxPZxUX0y1lrNKketg';
    
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // =======================================================================
    // AUTH SYSTEM - DANAKITA
    // =======================================================================
    const AUTH_STORAGE_KEY = 'danakita_session';
    const SESSION_DURATION_MS = 24 * 60 * 60 * 1000; // 24 jam
    let currentOrgId = null;
    let currentOrgCode = null;

    // Init: Cek session saat halaman load
    window.addEventListener('DOMContentLoaded', () => {
      checkExistingSession();
    });

    function showLoader(show) {
      document.getElementById('loader').classList.toggle('hidden', !show);
    }

    // Cek session yang tersimpan
    function checkExistingSession() {
      try {
        const session = JSON.parse(localStorage.getItem(AUTH_STORAGE_KEY));
        if (session && session.expiresAt > Date.now()) {
          // Session masih valid
          showDashboard(session);
        } else {
          // Session tidak ada/expired
          showKodeOrgStep();
        }
      } catch (e) {
        showKodeOrgStep();
      }
    }

    // STEP 1: Validasi Kode Organisasi
    async function handleValidateCode() {
      const code = document.getElementById('input-kode-org').value.trim().toUpperCase();
      if (!code) return alert('Masukkan kode organisasi!');

      showLoader(true);
      try {
        const { data, error } = await supabase
          .from('organizations')
          .select('id, nama, is_active, plan_tier')
          .eq('client_code', code)
          .single();

        if (error || !data) {
          alert('❌ Kode organisasi tidak valid!');
          return;
        }

        if (!data.is_active) {
          alert('❌ Organisasi ini sedang nonaktif. Hubungi Super Admin.');
          return;
        }

        // Kode valid, simpan dan tampilkan form login
        currentOrgId = data.id;
        currentOrgCode = code;
        
        document.getElementById('org-name-display').innerText = data.nama;
        document.getElementById('org-code-display').innerText = code;
        
        document.getElementById('step-kode-org').classList.add('hidden');
        document.getElementById('step-login').classList.remove('hidden');
        
      } catch (e) {
        alert('Error: ' + e.message);
      } finally {
        showLoader(false);
      }
    }

    // STEP 2A: Login Admin
    async function handleAdminLogin() {
      const username = document.getElementById('admin-username').value.trim();
      const password = document.getElementById('admin-password').value;

      if (!username || !password) return alert('Isi username dan password!');

      showLoader(true);
      try {
        const { data, error } = await supabase.rpc('rpc_login_admin', {
          p_username: username,
          p_password: password,
          p_org_id: currentOrgId
        });

        if (error || !data?.success) {
          alert('❌ ' + (data?.msg || 'Login gagal'));
          return;
        }

        // Simpan session
        const session = {
          userType: 'admin',
          userId: data.data.id,
          orgId: currentOrgId,
          orgCode: currentOrgCode,
          username: data.data.username,
          displayName: data.data.nama_admin,
          role: data.data.role,
          mustChangePassword: data.data.must_change_password,
          expiresAt: Date.now() + SESSION_DURATION_MS
        };

        localStorage.setItem(AUTH_STORAGE_KEY, JSON.stringify(session));
        showDashboard(session);

      } catch (e) {
        alert('Error: ' + e.message);
      } finally {
        showLoader(false);
      }
    }

    // STEP 2B: Login Warga
    async function handleWargaLogin() {
      const noRumah = document.getElementById('warga-no-rumah').value.trim().toUpperCase();
      const pin = document.getElementById('warga-pin').value;

      if (!noRumah || !pin) return alert('Isi No. Rumah dan PIN!');
      if (pin.length < 4) return alert('PIN minimal 4 digit!');

      showLoader(true);
      try {
        const { data, error } = await supabase.rpc('rpc_login_warga', {
          p_no_rumah: noRumah,
          p_pin: pin,
          p_org_id: currentOrgId
        });

        if (error || !data?.success) {
          alert('❌ ' + (data?.msg || 'Login gagal'));
          return;
        }

        // Simpan session
        const session = {
          userType: 'warga',
          userId: data.data.id,
          orgId: currentOrgId,
          orgCode: currentOrgCode,
          noRumah: data.data.no_rumah,
          displayName: data.data.nama,
          expiresAt: Date.now() + SESSION_DURATION_MS
        };

        localStorage.setItem(AUTH_STORAGE_KEY, JSON.stringify(session));
        showDashboard(session);

      } catch (e) {
        alert('Error: ' + e.message);
      } finally {
        showLoader(false);
      }
    }

    // Tampilkan Dashboard
    function showDashboard(session) {
      document.getElementById('step-kode-org').classList.add('hidden');
      document.getElementById('step-login').classList.add('hidden');
      document.getElementById('dashboard').classList.remove('hidden');
      document.getElementById('session-info').classList.remove('hidden');
      
      document.getElementById('session-name').innerText = session.displayName;
      document.getElementById('session-role').innerText = 
        session.userType === 'admin' ? `Pengurus (${session.role})` : 'Warga';
    }

    // Logout
    function handleLogout() {
      localStorage.removeItem(AUTH_STORAGE_KEY);
      currentOrgId = null;
      currentOrgCode = null;
      location.reload();
    }

    // Kembali ke step kode org
    function backToKode() {
      document.getElementById('step-login').classList.add('hidden');
      document.getElementById('step-kode-org').classList.remove('hidden');
      document.getElementById('input-kode-org').value = '';
    }

    // Switch tab login
    function switchLoginTab(type) {
      const tabAdmin = document.getElementById('tab-admin');
      const tabWarga = document.getElementById('tab-warga');
      const formAdmin = document.getElementById('form-admin');
      const formWarga = document.getElementById('form-warga');

      if (type === 'admin') {
        tabAdmin.className = 'flex-1 py-3 font-bold rounded-lg bg-blue-600 text-white transition';
        tabWarga.className = 'flex-1 py-3 font-bold rounded-lg bg-slate-200 text-slate-600 transition';
        formAdmin.classList.remove('hidden');
        formWarga.classList.add('hidden');
      } else {
        tabWarga.className = 'flex-1 py-3 font-bold rounded-lg bg-green-600 text-white transition';
        tabAdmin.className = 'flex-1 py-3 font-bold rounded-lg bg-slate-200 text-slate-600 transition';
        formWarga.classList.remove('hidden');
        formAdmin.classList.add('hidden');
      }
    }

    function showKodeOrgStep() {
      document.getElementById('step-kode-org').classList.remove('hidden');
      document.getElementById('step-login').classList.add('hidden');
      document.getElementById('dashboard').classList.add('hidden');
      document.getElementById('session-info').classList.add('hidden');
    }
  </script>
</body>
</html>
