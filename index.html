<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>DanaKita - Portal Warga</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  
  <style>
    body { background-color: #f8fafc; font-family: ui-sans-serif, system-ui, -apple-system, sans-serif; padding-bottom: 100px; }
    .tab-content { display: none; }
    .active { display: block; animation: fadeIn 0.2s; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    .nav-active { border-top: 3px solid #2563eb; color: #2563eb; font-weight: 800; }
    .nav-admin-active { border-top: 3px solid #1e293b; color: #1e293b; font-weight: 800; }
    input[type="text"], input[type="number"], input[type="month"], select, input[type="password"] { 
      @apply w-full p-3 border border-slate-300 bg-slate-50 shadow-inner rounded-xl focus:ring-2 focus:ring-blue-500 focus:bg-white outline-none transition text-sm; 
    }
    .btn-solid-blue { @apply bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded-xl shadow-md transition active:scale-95 text-sm w-full; }
    .btn-solid-red { @apply bg-red-600 hover:bg-red-700 text-white font-bold py-3 px-4 rounded-xl shadow-md transition active:scale-95 text-sm w-full; }
    .btn-solid-green { @apply bg-green-600 hover:bg-green-700 text-white font-bold py-3 px-4 rounded-xl shadow-md transition active:scale-95 text-sm w-full; }
    .form-grid { @apply grid grid-cols-[100px_10px_1fr] items-center gap-y-3 text-sm; }
  </style>
</head>
<body>

  <!-- LOADER -->
  <div id="loader" class="fixed inset-0 bg-white/90 backdrop-blur-sm z-[150] hidden flex items-center justify-center">
    <div class="flex flex-col items-center"><div class="animate-spin rounded-full h-10 w-10 border-b-4 border-blue-600 mb-2"></div><p class="text-xs font-bold text-slate-600">Memuat...</p></div>
  </div>

  <!-- LOGIN MODAL -->
  <div id="login-modal" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-[100] flex items-center justify-center p-4">
    <!-- Step 1: Kode Org -->
    <div id="step-kode" class="bg-white rounded-3xl p-6 w-full max-w-sm shadow-2xl">
      <h2 class="text-lg font-black text-slate-800 mb-4">🔑 Kode Organisasi</h2>
      <input type="text" id="input-kode-org" placeholder="Contoh: DKT-RT01-XYZ" class="mb-4 uppercase text-center font-mono text-lg tracking-wider">
      <button onclick="handleValidateCode()" class="btn-solid-blue">Lanjutkan</button>
      <p class="text-xs text-slate-400 mt-4 text-center"><a href="/super-admin.html" class="text-blue-600">Masuk Super Admin?</a></p>
    </div>

    <!-- Step 2: Login Form -->
    <div id="step-login" class="bg-white rounded-3xl p-6 w-full max-w-sm shadow-2xl hidden">
      <div class="flex justify-between items-center mb-6">
        <h2 class="text-lg font-black text-slate-800" id="org-title-display">Login</h2>
        <button onclick="backToKode()" class="text-slate-400 text-xl">&times;</button>
      </div>
      
      <div class="flex gap-2 mb-4 bg-slate-100 p-1 rounded-xl">
        <button onclick="switchLoginTab('admin')" id="tab-admin" class="flex-1 bg-white shadow-sm py-2 rounded-lg text-sm font-bold text-blue-600">Pengurus</button>
        <button onclick="switchLoginTab('warga')" id="tab-warga" class="flex-1 py-2 rounded-lg text-sm font-bold text-slate-500">Warga</button>
      </div>

      <div id="form-admin" class="space-y-4">
        <input type="text" id="auth-user" placeholder="Username">
        <input type="password" id="auth-pass" placeholder="Password">
        <button onclick="handleAdminLogin()" class="btn-solid-blue">Masuk Panel Admin</button>
      </div>

      <div id="form-warga" class="space-y-4 hidden">
        <input type="text" id="warga-no-rumah" placeholder="No. Rumah (A-12)">
        <input type="password" id="warga-pin" placeholder="PIN (4-6 digit)" maxlength="6">
        <button onclick="handleWargaLogin()" class="btn-solid-green">Masuk Portal Warga</button>
      </div>
    </div>
  </div>

  <!-- MAIN APP -->
  <div id="main-app" class="hidden">
    <header id="main-header" class="bg-white border-b sticky top-0 z-50 p-4 shadow-sm">
      <div class="flex justify-between items-center max-w-2xl mx-auto">
        <div><h1 class="text-xl font-black text-slate-800">DANAKITA</h1><p class="text-[10px] text-slate-500 font-bold tracking-widest" id="header-subtitle">PORTAL</p></div>
        <button onclick="handleLogout()" class="bg-red-50 text-red-600 font-bold px-3 py-2 rounded-xl text-xs hover:bg-red-100">Keluar</button>
      </div>
    </header>

    <main class="p-4 max-w-2xl mx-auto space-y-4">
      <div id="area-warga" class="hidden">
        <div id="view-dashboard" class="tab-content active w-sec">
          <div class="bg-gradient-to-br from-blue-600 to-indigo-700 p-6 rounded-3xl text-white shadow-xl mb-5">
            <p class="text-blue-200 text-xs font-bold uppercase tracking-widest">Saldo Kas Aktif</p>
            <h2 id="card-saldo" class="text-4xl font-black mt-1 mb-6">Rp 0</h2>
            <div class="flex gap-3 text-xs">
              <div class="flex-1 bg-white/20 backdrop-blur-sm p-3 rounded-xl"><span class="block text-[9px] text-blue-200 mb-1">TOTAL MASUK</span><span id="card-in" class="font-bold text-sm">Rp 0</span></div>
              <div class="flex-1 bg-white/20 backdrop-blur-sm p-3 rounded-xl"><span class="block text-[9px] text-blue-200 mb-1">TOTAL KELUAR</span><span id="card-out" class="font-bold text-sm">Rp 0</span></div>
            </div>
          </div>
        </div>
      </div>

      <div id="area-admin" class="hidden pb-10">
        <div id="view-admin-verify" class="tab-content active a-sec">
          <div class="bg-white p-6 rounded-3xl border-t-4 border-blue-500 shadow-sm">
            <h3 class="font-black text-slate-800 mb-4">✅ Verifikasi Pembayaran</h3>
            <div id="admin-pending-container" class="space-y-3"></div>
            <p id="empty-pending" class="text-center text-xs text-slate-400 py-4">Tidak ada pembayaran menunggu.</p>
          </div>
        </div>
        
        <div id="view-admin-master" class="tab-content a-sec space-y-6">
          <div class="bg-white p-6 rounded-3xl shadow-sm border">
            <h3 class="font-black text-slate-800 mb-4 text-sm uppercase">👥 Kelola Warga</h3>
            <div class="form-grid mb-4"><label>Nama</label><span>:</span><input type="text" id="adm-wrg-nama"><label>Blok</label><span>:</span><input type="text" id="adm-wrg-blok"></div>
            <button onclick="adminCreateWarga()" class="btn-solid-blue">+ Simpan Warga</button>
            <div id="admin-warga-list" class="mt-6 space-y-2 max-h-60 overflow-y-auto"></div>
          </div>
          
          <div class="bg-white p-6 rounded-3xl shadow-sm border">
            <h3 class="font-black text-slate-800 mb-4 text-sm uppercase">📁 Buka Project</h3>
            <div class="form-grid mb-4"><label>Project</label><span>:</span><input type="text" id="adm-proj-nama"><label>Nominal</label><span>:</span><input type="number" id="adm-proj-nominal"></div>
            <button onclick="adminCreateProject()" class="btn-solid-blue">+ Terbitkan</button>
            <div id="admin-project-list" class="mt-6 space-y-2"></div>
          </div>
        </div>
      </div>
    </main>

    <nav id="nav-warga" class="fixed bottom-0 left-0 right-0 bg-white border-t flex justify-around p-2 pb-6 z-40 hidden">
      <button onclick="switchTab('dashboard', 'warga')" class="w-nav flex-1 nav-active flex flex-col items-center p-2 text-slate-400"><span class="text-2xl mb-1">🏠</span><span class="text-[10px] font-black uppercase">Beranda</span></button>
    </nav>

    <nav id="nav-admin" class="fixed bottom-0 left-0 right-0 bg-slate-900 border-t flex justify-around p-2 pb-6 z-40 hidden text-white">
      <button onclick="switchTab('admin-verify', 'admin')" class="a-nav flex-1 nav-admin-active flex flex-col items-center p-2 text-slate-500"><span class="text-xl mb-1">✅</span><span class="text-[9px] font-bold text-white uppercase">Verifikasi</span></button>
      <button onclick="switchTab('admin-master', 'admin')" class="a-nav flex-1 flex flex-col items-center p-2 text-slate-500"><span class="text-xl mb-1">👥</span><span class="text-[9px] font-bold text-white uppercase">Master</span></button>
    </nav>
  </div>

  <script>
    // GLOBAL VARIABLES
    let currentOrgId = null;
    let currentUser = null;
    let appData = { warga: [], project: [], pembayaran: [], detail: [], pengeluaran: [], danaLain: [] };
    
    // INIT SUPABASE (Hanya sekali)
    if (!window.supabaseClient) {
      window.supabaseClient = window.supabase.createClient(
        'https://tgcpyatrllswhlysqfer.supabase.co',
        'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRnY3B5YXRybGxzd2hseXNxZmVyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU4MjI2ODMsImV4cCI6MjA5MTM5ODY4M30.BHY6R2e62YvXz-N_2n_qHossbKxPZxUX0y1lrNKketg'
      );
    }
    const supabase = window.supabaseClient;

    // INIT APP
    window.addEventListener('DOMContentLoaded', () => {
      const session = JSON.parse(localStorage.getItem('danakita_session'));
      if (session && session.expiresAt > Date.now()) {
        currentOrgId = session.orgId;
        currentUser = { type: session.userType, id: session.userId, name: session.displayName };
        showApp();
      }
    });

    // GLOBAL FUNCTIONS (Expose ke window)
    window.handleValidateCode = async function() {
      const code = document.getElementById('input-kode-org').value.trim().toUpperCase();
      if(!code) return alert('Masukkan kode!');
      
      document.getElementById('loader').classList.remove('hidden');
      const { data, error } = await supabase.from('organizations').select('id, nama').eq('client_code', code).single();
      document.getElementById('loader').classList.add('hidden');
      
      if (data && !error) {
        currentOrgId = data.id;
        document.getElementById('org-title-display').innerText = data.nama;
        document.getElementById('step-kode').classList.add('hidden');
        document.getElementById('step-login').classList.remove('hidden');
      } else {
        alert('Kode Organisasi Salah!');
      }
    };

    window.backToKode = function() {
      document.getElementById('step-login').classList.add('hidden');
      document.getElementById('step-kode').classList.remove('hidden');
    };

    window.switchLoginTab = function(type) {
      const tabAdm = document.getElementById('tab-admin');
      const tabWrg = document.getElementById('tab-warga');
      const formAdm = document.getElementById('form-admin');
      const formWrg = document.getElementById('form-warga');

      if(type==='admin') {
        tabAdm.className = 'flex-1 bg-white shadow-sm py-2 rounded-lg text-sm font-bold text-blue-600';
        tabWrg.className = 'flex-1 py-2 rounded-lg text-sm font-bold text-slate-500';
        formAdm.classList.remove('hidden'); formWrg.classList.add('hidden');
      } else {
        tabWrg.className = 'flex-1 bg-white shadow-sm py-2 rounded-lg text-sm font-bold text-green-600';
        tabAdm.className = 'flex-1 py-2 rounded-lg text-sm font-bold text-slate-500';
        formWrg.classList.remove('hidden'); formAdm.classList.add('hidden');
      }
    };

    window.handleAdminLogin = async function() {
      const u = document.getElementById('auth-user').value;
      const p = document.getElementById('auth-pass').value;
      
      document.getElementById('loader').classList.remove('hidden');
      const { data, error } = await supabase.rpc('rpc_login_admin', { p_username: u, p_password: p, p_org_id: currentOrgId });
      document.getElementById('loader').classList.add('hidden');
      
      if(data && data.success) {
        saveSession('admin', data.data.id, data.data.username, data.data.nama_admin);
      } else {
        alert('Login Gagal: ' + (data?.msg || 'Check credential'));
      }
    };

    window.handleWargaLogin = async function() {
      const r = document.getElementById('warga-no-rumah').value;
      const pin = document.getElementById('warga-pin').value;
      
      document.getElementById('loader').classList.remove('hidden');
      const { data, error } = await supabase.rpc('rpc_login_warga', { p_no_rumah: r, p_pin: pin, p_org_id: currentOrgId });
      document.getElementById('loader').classList.add('hidden');
      
      if(data && data.success) {
        saveSession('warga', data.data.id, data.data.no_rumah, data.data.nama);
      } else {
        alert('Login Gagal: ' + (data?.msg || 'Check credential'));
      }
    };

    window.handleLogout = function() {
      localStorage.removeItem('danakita_session');
      location.reload();
    };

    window.switchTab = function(tabId, role) {
      document.querySelectorAll(`.${role==='warga'?'w-sec':'a-sec'}`).forEach(c => c.classList.remove('active'));
      document.getElementById('view-'+tabId).classList.add('active');
    };

    function saveSession(type, id, userRef, name) {
      const session = { userType: type, userId: id, userRef: userRef, displayName: name, orgId: currentOrgId, expiresAt: Date.now() + 86400000 };
      localStorage.setItem('danakita_session', JSON.stringify(session));
      currentUser = { type, id, name };
      showApp();
    }

    function showApp() {
      document.getElementById('login-modal').classList.add('hidden');
      document.getElementById('main-app').classList.remove('hidden');
      
      if(currentUser.type === 'admin') {
        document.getElementById('area-admin').classList.remove('hidden');
        document.getElementById('area-warga').classList.add('hidden');
        document.getElementById('nav-admin').classList.remove('hidden');
        document.getElementById('nav-warga').classList.add('hidden');
        document.getElementById('header-subtitle').innerText = "PANEL PENGURUS";
        renderAdminData();
      } else {
        document.getElementById('area-warga').classList.remove('hidden');
        document.getElementById('area-admin').classList.add('hidden');
        document.getElementById('nav-warga').classList.remove('hidden');
        document.getElementById('nav-admin').classList.add('hidden');
        document.getElementById('header-subtitle').innerText = "PORTAL WARGA";
        renderWargaDashboard();
      }
    }

    async function initAppData() {
      document.getElementById('loader').classList.remove('hidden');
      const [w, p, pay, det, out, inc] = await Promise.all([
        supabase.from('warga').select('*').eq('organization_id', currentOrgId).neq('status', 'INACTIVE'),
        supabase.from('project').select('*').eq('organization_id', currentOrgId).eq('status', 'ACTIVE'),
        supabase.from('pembayaran').select('*').eq('organization_id', currentOrgId),
        supabase.from('pembayaran_detail').select('*').eq('organization_id', currentOrgId),
        supabase.from('pengeluaran').select('*').eq('organization_id', currentOrgId),
        supabase.from('dana_lain').select('*').eq('organization_id', currentOrgId)
      ]);
      
      appData = { warga: w.data||[], project: p.data||[], pembayaran: pay.data||[], detail: det.data||[], pengeluaran: out.data||[], danaLain: inc.data||[] };
      document.getElementById('loader').classList.add('hidden');
      return true;
    }

    window.adminCreateWarga = async function() {
      const nama = document.getElementById('adm-wrg-nama').value;
      const blok = document.getElementById('adm-wrg-blok').value;
      if(!nama) return alert("Isi nama!");
      
      document.getElementById('loader').classList.remove('hidden');
      const {  hash } = await supabase.rpc('hash_password', { raw_pass: '1234' });
      
      const { error } = await supabase.from('warga').insert([{
        id: 'WRG-' + Date.now(),
        organization_id: currentOrgId,
        nama: nama,
        no_rumah: blok,
        pin_hash: hash,
        status: 'ACTIVE'
      }]);
      
      if(!error) {
        alert("Warga berhasil ditambahkan! PIN Default: 1234");
        document.getElementById('adm-wrg-nama').value = '';
        document.getElementById('adm-wrg-blok').value = '';
        await initAppData();
        renderAdminData();
      } else {
        alert("Error: " + error.message);
      }
      document.getElementById('loader').classList.add('hidden');
    };

    window.adminCreateProject = async function() {
      const nama = document.getElementById('adm-proj-nama').value;
      const nom = document.getElementById('adm-proj-nominal').value;
      if(!nama) return alert("Isi nama project!");

      document.getElementById('loader').classList.remove('hidden');
      const { error } = await supabase.from('project').insert([{
        id: 'PRJ-' + Date.now(),
        organization_id: currentOrgId,
        nama_project: nama,
        nominal_default: nom,
        tipe: 'bulanan',
        status: 'ACTIVE'
      }]);
      
      if(!error) {
        alert("Project ditambahkan");
        document.getElementById('adm-proj-nama').value = '';
        document.getElementById('adm-proj-nominal').value = '';
        await initAppData();
        renderAdminData();
      }
      document.getElementById('loader').classList.add('hidden');
    };

    async function renderAdminData() {
      await initAppData();
      
      let wHtml = '';
      appData.warga.forEach(w => {
        wHtml += `<div class="bg-slate-50 p-3 rounded-xl border flex justify-between"><span class="text-xs font-bold">${w.nama} (${w.no_rumah})</span><span class="text-[10px] text-green-600 font-bold">PIN: 1234</span></div>`;
      });
      document.getElementById('admin-warga-list').innerHTML = wHtml || '<p class="text-xs text-slate-400">Belum ada warga.</p>';

      let pHml = '';
      appData.project.forEach(p => {
        pHml += `<div class="bg-blue-50 p-3 rounded-xl border border-blue-100 flex justify-between"><span class="text-xs font-bold text-blue-800">${p.nama_project}</span><span class="text-xs font-bold text-blue-600">Rp ${Number(p.nominal_default).toLocaleString('id-ID')}</span></div>`;
      });
      document.getElementById('admin-project-list').innerHTML = pHml || '<p class="text-xs text-slate-400">Belum ada project.</p>';

      let pending = appData.pembayaran.filter(p => p.status === 'MENUNGGU VERIFIKASI');
      document.getElementById('empty-pending').classList.toggle('hidden', pending.length > 0);
    }

    async function renderWargaDashboard() {
      await initAppData();
      let totIn = appData.pembayaran.filter(p=>p.status==='DISETUJUI').reduce((s,p)=>s+Number(p.total_nominal), 0);
      let totOut = appData.pengeluaran.reduce((s,p)=>s+Number(p.nominal), 0);
      
      document.getElementById('card-saldo').innerText = 'Rp ' + (totIn - totOut).toLocaleString('id-ID');
      document.getElementById('card-in').innerText = 'Rp ' + totIn.toLocaleString('id-ID');
      document.getElementById('card-out').innerText = 'Rp ' + totOut.toLocaleString('id-ID');
    }
  </script>
</body>
</html>
